<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form - Day 4 Monochrome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2>Registration Form</h2>
        <p class="subtitle">Experience sharp monochrome interactions</p>
        
        <form onsubmit="event.preventDefault(); alert('Day 4 Black & White Polish Passed!');">
            
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Min. 6 characters required" minlength="6" required>
            </div>

            <div class="radio-group-container">
                <p>Gender</p>
                <div class="radio-options">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="male" required> Male
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="female"> Female
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="other"> Other
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="interest">Course / Interest</label>
                <select id="interest" required>
                    <option value="" disabled selected>Select your interest</option>
                    <option value="frontend">Frontend Development</option>
                    <option value="backend">Backend Development</option>
                    <option value="uiux">UI/UX Design</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">Register Now <span class="arrow">➔</span></button>

        </form>
    </div>

</body>
</html>
